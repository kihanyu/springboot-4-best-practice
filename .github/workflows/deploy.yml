name: Spring Boot GraalVM JDK 25 CI-CD

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Publish to JFrog
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Git 기록을 온전히 가져와 정확한 커밋 해시 추적 가능케 함

    - name: Set up GraalVM JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'graalvm'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Run Spring Boot Tests
      run: ./gradlew test --no-daemon

    - name: Extract Metadata (Version & Short SHA)
      id: meta
      run: |
        # Gradle 프로젝트 정보로부터 버전 추출
        PROJECT_VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
        echo "PROJECT_VERSION=$PROJECT_VERSION" >> $GITHUB_OUTPUT
        
        # Git Short SHA 추출
        SHORT_SHA=$(git rev-parse --short HEAD)
        echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
      shell: bash

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to JFrog Artifactory Registry
      uses: docker/login-action@v3
      with:
        registry: a.jfrog.com
        username: ${{ secrets.JFROG_USERNAME }}
        password: ${{ secrets.JFROG_PASSWORD }}

    - name: Build and Push Spring Boot Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        # 업계 표준에 부합하는 다중 버저닝 태깅 규칙 적용
        tags: |
          a.jfrog.com/bp/springboot-app:latest
          a.jfrog.com/bp/springboot-app:${{ steps.meta.outputs.PROJECT_VERSION }}-${{ github.run_number }}
          a.jfrog.com/bp/springboot-app:${{ steps.meta.outputs.SHORT_SHA }}
        # GitHub Actions 캐시 백엔드를 이용한 빌드 레이어 캐싱 (빌드 가속)
        cache-from: type=gha
        cache-to: type=gha,mode=max
